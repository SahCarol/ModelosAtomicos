<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modelos Atômicos: A Saga Interativa | Dalton, Thomson, Rutherford, Bohr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 20%, #1a2a1f, #0a1208);
            font-family: 'Segoe UI', 'Corbel', 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            position: relative;
        }

        /* Efeito de pergaminho antigo */
        .story-container {
            max-width: 950px;
            width: 100%;
            background: #fffaf0;
            background-image: linear-gradient(to bottom, #fff5e6, #faeecd);
            border-radius: 65px 35px 65px 35px;
            box-shadow: 0 30px 45px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,245,200,0.8);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid #dbb87c;
        }

        .header {
            background: #2c4727;
            padding: 18px 24px;
            text-align: center;
            border-bottom: 5px solid #f3b33d;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            color: #ffea9e;
            text-shadow: 3px 3px 0 #4a2a0c;
            font-weight: 800;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .header p {
            color: #f7d977;
            font-style: italic;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .story-card {
            padding: 30px 30px 20px 30px;
            min-height: 480px;
        }

        .story-text {
            font-size: 1.22rem;
            line-height: 1.55;
            color: #2c2b1f;
            background: #fffff2;
            padding: 25px 28px;
            border-radius: 55px 25px 55px 25px;
            box-shadow: inset 0 0 0 2px #fff9e8, 0 12px 22px rgba(0,0,0,0.1);
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-bottom: 30px;
            text-align: left;
        }

        .choices-area {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            margin: 15px 0 10px;
            justify-content: center;
        }

        .choice-btn {
            background: #4d6a3b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #2a3a1f;
            font-family: inherit;
            flex: 1 0 auto;
            max-width: 280px;
        }

        .choice-btn:hover {
            background: #6a8e4a;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2a3a1f;
        }

        .choice-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2a3a1f;
        }

        .reset-btn {
            background: #b46f3a;
            box-shadow: 0 4px 0 #6e3e1a;
            margin-top: 6px;
        }

        .footer {
            background: #e9dbbc;
            padding: 14px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #4e3b24;
            border-top: 1px dashed #c7a56b;
        }

        .progress {
            background: #2d2b1f;
            padding: 5px 14px;
            border-radius: 50px;
            color: #ffefb0;
            font-weight: bold;
            font-family: monospace;
        }

        @media (max-width: 650px) {
            .story-text {
                font-size: 1rem;
                padding: 18px;
            }
            .choice-btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
        }

        /* pequena decoração */
        .atom-icon {
            font-size: 1.2rem;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="story-container" id="app">
    <div class="header">
        <h1>⚛️ MODELOS ATÔMICOS: <span style="font-size:1.8rem;">⚗️</span></h1>
        <p>▸ A história real (e nem tão real) dos átomos | Escolhas, risadas e descobertas ◂</p>
    </div>
    <div class="story-card">
        <div class="story-text" id="storyText">
            Carregando a linha do tempo atômica...
        </div>
        <div class="choices-area" id="choicesContainer"></div>
    </div>
    <div class="footer">
        <div>🧪 Baseado em Dalton, Thomson, Rutherford, Bohr, Becquerel | <strong>ciência e humor</strong></div>
        <button class="reset-btn choice-btn" id="resetBtn">⟳ Reiniciar experimento</button>
        <div class="progress" id="progressBadge">🌌 início</div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // HISTÓRIA ALTERNATIVA E INTERATIVA (mantendo coerência original)
    // Com referências aprofundadas sobre modelos atômicos
    // --------------------------------------------------------------
    
    const scenes = {
        // PRÓLOGO - O BANHO FILOSÓFICO DE DALTON E A LARANJA
        inicio: {
            id: "inicio",
            text: `🧴 <strong>1803 – Manchester, Inglaterra.</strong> Dois homens tomam banho num riacho. Um esfrega as costas do outro e exclama: <em>"Sua pele continua intacta! Você deve ser feito de algo indestrutível!"</em> — <em>"Mais indestrutível que água, fogo, terra e ar?"</em> — <em>"Espera… você é o avatar?"</em> — <em>"Não, mas sou feito de algo que suporta elementos!"</em> Anos depois, <strong>John Dalton</strong> relembra a conversa e cunha a palavra <strong>ÁTOMO</strong> (do grego "átomos": indivisível). <br><br> 🍊 Debatiado sob uma laranjeira, uma laranja cai em sua cabeça. <em>"Tudo é redondo! O átomo deve ser esférico!"</em> Em sua palestra, usa bolas de sinuca para representar elementos, mas descobre que é daltônico – troca as bolas vermelhas e verdes. A plateia gargalha. Agora, a aventura atômica começa. <br><br> ⚛️ <strong>O que fazer?</strong>`,
            choices: [
                { text: "🍊 Ajudar Dalton com um método de formas geométricas (triângulos e quadrados)", nextId: "dalton_geometria", effect: "dalton_geo" },
                { text: "💡 Explorar a ideia de 'átomos luminosos' e ganhar a atenção de um jovem Niels Bohr", nextId: "dalton_luz", effect: "luz_atomica" },
                { text: "☢️ Pular para a descoberta acidental do urânio por Becquerel (pedra filosofal)", nextId: "becquerel_uranio", effect: "skip_to_radio" }
            ]
        },
        
        // RAMO DALTON GEOMETRIA - REFERÊNCIA AOS SÍMBOLOS ATÔMICOS
        dalton_geometria: {
            id: "dalton_geometria",
            text: `📐 <strong>Dalton adota formas geométricas:</strong> círculos, quadrados e triângulos para diferenciar os elementos. Sua notação se torna famosa e influencia a química. Ele publica <em>"Um Novo Sistema de Filosofia Química"</em> (1808), onde propõe que: <br> 
            1) átomos são indivisíveis; <br>
            2) átomos de um elemento são idênticos em massa; <br>
            3) compostos são combinações de átomos diferentes. <br><br>
            Porém, décadas depois, <strong>J.J. Thomson</strong> revoluciona tudo. Em 1897, com tubos de raios catódicos, descobre partículas negativas: os <strong>elétrons</strong>! <em>"O átomo não é maciço! Existem partículas menores!"</em> Sua esposa faz um pudim de passas e ele tem um insight: o átomo é como um "pudim de passas" – cargas positivas como massa e elétrons incrustados (modelo "plum pudding"). <br><br> 🍮 O que fazer agora?`,
            choices: [
                { text: "🔬 Ajudar Thomson a melhorar o experimento dos raios catódicos", nextId: "thomson_catodico", effect: "melhoria_tubo" },
                { text: "🍮 Aceitar o pudim de passas e ir direto para o aluno Rutherford", nextId: "rutherford_ouro_hist", effect: "ruther_inicio" }
            ]
        },
        
        // RAMO DALTON + LUZ (precursor de Bohr)
        dalton_luz: {
            id: "dalton_luz",
            text: `✨ <strong>Dalton propõe que átomos emitem "brilho próprio" quando aquecidos</strong>. Essa ideia, embora primitiva, antecipa a espectroscopia. Anos mais tarde, <strong>Gustav Kirchhoff e Robert Bunsen</strong> mostram que cada elemento tem um espectro de cores único (1859). <br><br>
            Em Copenhague, <strong>Niels Bohr</strong> fica fascinado: <em>"E se os elétrons só pudessem ocupar certas órbitas? Ao saltar, emitem luz!"</em> Nasce o <strong>modelo atômico de Bohr (1913)</strong>: níveis de energia discretos (K, L, M...), como degraus. Mas ele precisa de dados experimentais.<br><br>
            🌌 Você decide apoiar Bohr ou investigar o núcleo com Rutherford.`,
            choices: [
                { text: "🌞 Ajudar Bohr com as órbitas quânticas (modelo planetário)", nextId: "bohr_quantum_early", effect: "bohr_apoio" },
                { text: "⚡ Seguir Rutherford no experimento da folha de ouro (descoberta do núcleo)", nextId: "rutherford_ouro_hist", effect: "gold_alpha" }
            ]
        },
        
        // BECQUEREL E A PEDRA FILOSOFAL (urânio + radioatividade)
        becquerel_uranio: {
            id: "becquerel_uranio",
            text: `☢️ <strong>1896, Paris.</strong> Henri Becquerel guarda uma pedra de urânio no bolso, achando ser a pedra filosofal. Sua perna adoece, precisa amputar. Ainda assim, insiste e coloca no outro bolso... Mesmo destino. Depois, no bolso da camisa – o coração é afetado e ele falece. <br><br>
            Os alquimistas vendem as pedras como "cosméticos cósmicos", causando mortes e perda de dentes. Mas um amigo de Becquerel, <strong>J.J. Thomson</strong>, pega a amostra e a conecta a uma bateria: descobre que a pedra emite radiação capaz de ionizar o ar, e vê "partículas negativas" desviando para o polo positivo. <strong>Nasce a descoberta dos elétrons!</strong> <br><br>
            Thomson então propõe o <strong>modelo atômico do pudim de passas</strong> (1897), onde elétrons negativos estão mergulhados numa "sopa" positiva. <br><br> 🧪 Avançar:`,
            choices: [
                { text: "🍰 Explorar o modelo de pudim de passas e depois o experimento de Rutherford", nextId: "rutherford_ouro_hist", effect: "pudim_to_ruth" },
                { text: "📡 Ir direto para a descoberta da radioatividade e o modelo nuclear", nextId: "rutherford_nuclear_force", effect: "nuclear_descoberta" }
            ]
        },
        
        // THOMSON E OS RAIOS CATÓDICOS (aprofundamento)
        thomson_catodico: {
            id: "thomson_catodico",
            text: `⚡ <strong>J.J. Thomson (1897) – Laboratório Cavendish.</strong> Usando tubos de Crookes com cátodo e ânodo, ele aplica campos elétricos e magnéticos. Observa que partículas (elétrons) se desviam para o lado positivo. Mede a relação carga/massa (e/m) e descobre que são ~1800 vezes menores que o átomo de hidrogênio. <em>"O átomo não é indivisível! Contém corpúsculos negativos!"</em> <br><br>
            Inspirado pelo pudim de passas da esposa, cria o modelo: uma esfera positiva uniforme com elétrons incrustados, como passas. Esse modelo domina por 14 anos. Porém, seu aluno <strong>Ernest Rutherford</strong> duvida. <br><br>
            🔬 Rutherford decide bombardear uma folha de ouro com partículas alfa. Você o ajuda:`,
            choices: [
                { text: "🏅 Realizar o Experimento de Rutherford (folha de ouro, 1911)", nextId: "rutherford_ouro_hist", effect: "rutherford_real" },
                { text: "📖 Investigar os espectros atômicos com Bohr e pular para o modelo quântico", nextId: "bohr_quantum_early", effect: "espectro_bohr" }
            ]
        },
        
        // EXPERIMENTO DE RUTHERFORD (FOIL DE OURO) - Ponto central
        rutherford_ouro_hist: {
            id: "rutherford_ouro_hist",
            text: `🥇 <strong>1911 – Universidade de Manchester.</strong> Rutherford, auxiliado por <strong>Hans Geiger e Ernest Marsden</strong>, monta o experimento: uma fonte de partículas alfa (urânio) dentro de chumbo, uma finíssima lâmina de ouro (500 átomos de espessura) e um detector de sulfeto de zinco. <br><br>
            Resultado surpreendente: a maioria das partículas atravessa, mas <strong>1 a cada 8000 ricocheteia de volta</strong>! <em>"Foi como atirar um projétil de 15 polegadas em papel tissue e ele voltar!"</em> Rutherford conclui que o átomo tem um <strong>núcleo minúsculo, denso e positivo</strong> (tamanho 10⁻¹⁵ m), e os elétrons giram ao redor, como planetas (modelo planetário). <br><br>
            Seu assistente <strong>Niels Bohr</strong> refina: "elétrons só podem ocupar órbitas fixas sem irradiar energia". Nascia o <strong>modelo de Bohr (1913)</strong>, explicando as raias espectrais do hidrogênio. <br><br> 🌟 Para onde vamos?`,
            choices: [
                { text: "🌌 Abraçar o modelo de Bohr com órbitas quânticas (final clássico)", nextId: "ending_bohr_model", effect: "bohr_end_feliz" },
                { text: "🌀 Ir além: introduzir a dualidade onda-partícula (De Broglie, Schrödinger)", nextId: "ending_quantum_wave", effect: "onda_moderna" },
                { text: "⚛️ Revisitar o núcleo atômico e descobrir o nêutron (Chadwick)", nextId: "neutron_descoberta", effect: "neutron_path" }
            ]
        },
        
        // RUTHERFORD FORÇA NUCLEAR (aprofundamento)
        rutherford_nuclear_force: {
            id: "rutherford_nuclear_force",
            text: `🔬 Após o experimento da folha de ouro, Rutherford percebe que o núcleo é positivo, mas como ele se mantém coeso? Em 1920, ele propõe a existência de uma partícula neutra no núcleo – o <strong>nêutron</strong>, descoberto por James Chadwick em 1932. O átomo agora tem: prótons (+), nêutrons (0) e elétrons (-). <br><br>
            A história avança e a física quântica explode. <strong>Erwin Schrödinger</strong> cria o modelo da nuvem eletrônica (equação de onda, 1926), onde não há órbitas definidas, mas sim orbitais probabilísticos. O modelo atômico atual: nuvens eletrônicas, números quânticos. <br><br> ⚛️ Escolha o final:`,
            choices: [
                { text: "🌠 Final: Modelo Quântico Moderno (nuvens eletrônicas)", nextId: "ending_quantum_wave", effect: "modern_cloud" },
                { text: "📚 Final Histórico: O legado de Bohr, Rutherford e a fissão nuclear", nextId: "ending_bohr_model", effect: "legacy_end" }
            ]
        },
        
        // BOHR CEDO - MODELO PLANETÁRIO QUÂNTICO
        bohr_quantum_early: {
            id: "bohr_quantum_early",
            text: `🌍 <strong>Niels Bohr (1913)</strong> combina a ideia de Rutherford com a constante de Planck: os elétrons só podem ocupar órbitas com momento angular quantizado: <em>m·v·r = n·h/2π</em>. Quando saltam de uma órbita para outra, emitem ou absorvem fótons de energia específica. Isso explica perfeitamente o espectro do hidrogênio (série de Lyman, Balmer, Paschen). <br><br>
            Bohr ganha o Nobel em 1922. Porém, o modelo falha para átomos mais complexos. Surge a necessidade da mecânica ondulatória. <br><br> 🧬 Decisão final:`,
            choices: [
                { text: "⚛️ Fechar com o modelo de Bohr + aprimoramentos de Sommerfeld (elipses)", nextId: "ending_bohr_model", effect: "sommerfeld_end" },
                { text: "🌀 Abraçar o modelo de Schrödinger e Heisenberg (nuvens e incerteza)", nextId: "ending_quantum_wave", effect: "principio_incerteza" }
            ]
        },
        
        // RAMO DO NÊUTRON
        neutron_descoberta: {
            id: "neutron_descoberta",
            text: `🔍 <strong>1932, James Chadwick</strong> descobre o nêutron (partícula sem carga no núcleo). O átomo agora é entendido como: prótons e nêutrons no núcleo, elétrons na eletrosfera. Isso explica isótopos e a radioatividade. <br><br>
            A partir disso, a física nuclear avança: fissão, fusão, bombas atômicas e energia nuclear. O legado dos modelos atômicos se torna central para a humanidade. <br><br> Você pode terminar a história com uma reflexão científica ou recomeçar.`,
            choices: [
                { text: "🏁 Final: descoberta do nêutron e era nuclear", nextId: "ending_bohr_model", effect: "neutron_legacy" },
                { text: "🔄 Recomeçar a jornada atômica", nextId: "inicio", effect: "reset" }
            ]
        },
        
        // FINAL CLÁSSICO - BOHR
        ending_bohr_model: {
            id: "ending_bohr_model",
            text: `🏆 <strong>FINAL HISTÓRICO – O MODELO DE BOHR E A ERA DE OURO DA FÍSICA</strong> 🏆<br><br>
            Depois de tantas reviravoltas, <strong>Dalton, Thomson, Rutherford e Bohr</strong> são celebrados como pais do átomo. Bohr recebe o Nobel em 1922, e seu modelo ainda é ensinado nas escolas como introdução à quântica. A frase de Dalton ecoa: <em>"Tudo é feito de algo indestrutível... mas descobrimos que esse algo tem coração (núcleo) e alma (elétrons)!"</em> <br><br>
            A ciência prova que o átomo é <strong>quase vazio (99,999% de espaço vazio)</strong>, e que a realidade é muito mais estranha que uma bola de sinuca. Tudo começou com um banho filosófico e uma laranja na cabeça. <br><br>
            🧪 Parabéns por construir a história dos modelos atômicos!`,
            choices: [
                { text: "🔬 Recomeçar jornada atômica", nextId: "inicio", effect: "reset" }
            ]
        },
        
        // FINAL QUÂNTICO AVANÇADO
        ending_quantum_wave: {
            id: "ending_quantum_wave",
            text: `🌀 <strong>FINAL QUÂNTICO – A NUVEM DE PROBABILIDADES</strong> 🌀<br><br>
            Inspirados por Bohr e Rutherford, <strong>Louis de Broglie</strong> (1924) propõe que elétrons têm comportamento ondulatório. <strong>Erwin Schrödinger</strong> formula sua famosa equação de onda (1926), substituindo órbitas por <strong>orbitais</strong> (regiões com alta probabilidade de encontrar o elétron). <strong>Werner Heisenberg</strong> cria o princípio da incerteza: não podemos saber posição e momento ao mesmo tempo. <br><br>
            O modelo atômico atual é uma nuvem eletrônica, sem trajetórias definidas. A realidade é feita de campos quânticos. A história começou com Dalton e uma laranja, e terminou com a teoria mais precisa da ciência. <br><br>
            🌟 <em>"A natureza não é clássica, e isso é lindo."</em> – Parabéns, viajante atômico!`,
            choices: [
                { text: "✨ Recomeçar aventura", nextId: "inicio", effect: "reset" }
            ]
        }
    };
    
    // Estado atual
    let currentId = "inicio";
    
    // Elementos DOM
    const storyDiv = document.getElementById("storyText");
    const choicesDiv = document.getElementById("choicesContainer");
    const resetBtn = document.getElementById("resetBtn");
    const progressSpan = document.getElementById("progressBadge");
    
    function renderScene(sceneId) {
        const scene = scenes[sceneId];
        if (!scene) {
            storyDiv.innerHTML = "⚠️ Cena não encontrada. Reinicie a experiência.";
            choicesDiv.innerHTML = '<button class="choice-btn reset-btn" id="forceReset">Reiniciar</button>';
            const fr = document.getElementById("forceReset");
            if (fr) fr.onclick = () => { currentId = "inicio"; renderScene("inicio"); };
            return;
        }
        
        // texto com formatação
        storyDiv.innerHTML = scene.text;
        
        // atualizar badge temático
        let badge = "⚛️ história";
        if (sceneId.includes("dalton")) badge = "🧪 Dalton & átomos";
        else if (sceneId.includes("thomson")) badge = "🍮 Thomson & elétrons";
        else if (sceneId.includes("rutherford")) badge = "🏅 Rutherford & núcleo";
        else if (sceneId.includes("bohr")) badge = "🌌 Bohr & órbitas";
        else if (sceneId.includes("becquerel")) badge = "☢️ Becquerel & rádio";
        else if (sceneId.includes("ending")) badge = "🏁 Final científico";
        else if (sceneId.includes("quantum")) badge = "🌀 Onda quântica";
        else if (sceneId === "inicio") badge = "🍊 Laranja de Dalton";
        progressSpan.innerText = `📘 ${badge}`;
        
        // gerar botões
        choicesDiv.innerHTML = "";
        if (scene.choices && scene.choices.length > 0) {
            scene.choices.forEach(choice => {
                const btn = document.createElement("button");
                btn.className = "choice-btn";
                btn.innerText = choice.text;
                btn.addEventListener("click", () => {
                    if (scenes[choice.nextId]) {
                        currentId = choice.nextId;
                        renderScene(currentId);
                    } else {
                        // fallback
                        currentId = "inicio";
                        renderScene("inicio");
                    }
                });
                choicesDiv.appendChild(btn);
            });
        } else {
            const restartBtn = document.createElement("button");
            restartBtn.className = "choice-btn reset-btn";
            restartBtn.innerText = "🔁 Recomeçar história";
            restartBtn.onclick = () => { currentId = "inicio"; renderScene("inicio"); };
            choicesDiv.appendChild(restartBtn);
        }
        
        // rolagem suave
        document.querySelector(".story-card")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }
    
    resetBtn.addEventListener("click", () => {
        currentId = "inicio";
        renderScene("inicio");
    });
    
    // Iniciar
    renderScene("inicio");
    
    // Easter egg: Ctrl + shift + L mostra curiosidade
    document.addEventListener("keydown", (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'L') {
            storyDiv.innerHTML += `<br><br>🔍 <em>Curiosidade: O átomo de hidrogênio tem cerca de 0,05 nanômetro de diâmetro, e seu núcleo 100 mil vezes menor! A história é maior que o átomo.</em>`;
        }
    });
</script>
</body>
</html>
