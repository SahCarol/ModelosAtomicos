<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modelos Atômicos | Contação de História</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #1a2a1f 0%, #0e160b 100%);
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* Container estilo livro antigo */
        .story-container {
            max-width: 900px;
            width: 100%;
            background: #fffaf0;
            background-image: radial-gradient(circle at 20% 35%, rgba(210, 180, 120, 0.15) 2%, transparent 2.5%);
            background-size: 40px 40px;
            border-radius: 55px 35px 55px 35px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,250,210,0.8);
            overflow: hidden;
        }

        /* Cabeçalho */
        .header {
            background: #2c4727;
            padding: 22px 28px;
            text-align: center;
            border-bottom: 5px solid #f3b33d;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            color: #ffea9e;
            text-shadow: 3px 3px 0 #4a2a0c;
            font-weight: 800;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .header p {
            color: #f7d977;
            font-style: italic;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        /* Área da história */
        .story-area {
            padding: 40px 35px 30px 35px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        .chapter-badge {
            display: inline-block;
            background: #d4a373;
            color: #2c2b1f;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 1px;
            margin-bottom: 20px;
            align-self: flex-start;
        }

        .story-text {
            background: #fffff2;
            padding: 30px 35px;
            border-radius: 45px 25px 45px 25px;
            box-shadow: inset 0 0 0 2px #fff9e8, 0 12px 24px rgba(0,0,0,0.1);
            font-size: 1.2rem;
            line-height: 1.65;
            color: #2c2b1f;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-bottom: 35px;
            flex: 1;
        }

        .story-text p {
            margin-bottom: 1.2rem;
        }

        .story-text p:last-child {
            margin-bottom: 0;
        }

        /* Navegação */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #4d6a3b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 32px;
            font-size: 1.05rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #2a3a1f;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #6a8e4a;
            transform: translateY(-2px);
            box-shadow: 0 7px 0 #2a3a1f;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2a3a1f;
        }

        .nav-btn:disabled {
            background: #8f9e7f;
            box-shadow: 0 5px 0 #5a6a4a;
            cursor: default;
            opacity: 0.7;
        }

        .reset-btn {
            background: #b46f3a;
            box-shadow: 0 5px 0 #6e3e1a;
        }

        .page-indicator {
            background: #2d2b1f;
            padding: 8px 24px;
            border-radius: 50px;
            color: #ffefb0;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .footer {
            background: #e9dbbc;
            padding: 14px 28px;
            text-align: center;
            font-size: 0.8rem;
            color: #5a482a;
            border-top: 1px dashed #c7a56b;
            font-style: italic;
        }

        @media (max-width: 650px) {
            .story-text {
                font-size: 1rem;
                padding: 22px;
            }
            .nav-btn {
                padding: 9px 20px;
                font-size: 0.9rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .story-area {
                padding: 25px 20px;
            }
        }

        /* pequenos detalhes */
        strong {
            color: #5a3e1f;
        }
    </style>
</head>
<body>
<div class="story-container">
    <div class="header">
        <h1>⚛️ MODELOS ATÔMICOS ⚗️</h1>
        <p>▸ Uma contação de histórias — de banhos filosóficos a nuvens quânticas ◂</p>
    </div>
    <div class="story-area">
        <div class="chapter-badge" id="chapterBadge">Parte 1</div>
        <div class="story-text" id="storyText">
            <!-- O conteúdo será inserido aqui -->
        </div>
        <div class="navigation">
            <button class="nav-btn reset-btn" id="resetBtn">⟳ Recomeçar</button>
            <div class="page-indicator" id="pageIndicator">Parte 1 / 6</div>
            <button class="nav-btn" id="nextBtn">Avançar ▶</button>
        </div>
    </div>
    <div class="footer">
        🧪 Baseado na história original de Dalton, Becquerel, Thomson, Rutherford e Bohr | Cientistas, laranjas, pudins e radioatividade
    </div>
</div>

<script>
    // ============================================================
    // CAPÍTULOS DA HISTÓRIA (versão fluida, corrigida e envolvente)
    // ============================================================
    const chapters = [
        {   
            title: "🍊 Parte 1: Dalton e a Bola de Sinuca",
            content: `
                <p>Dois homens tomavam banho juntos. Um deles esfregava as costas do outro e disse:<br>
                — Estou esfregando muito suas costas e sua pele está intacta. Você deve ser feito de algo indestrutível.<br>
                — A pele deve ser feita de algo mais indestrutível do que a água, o fogo, a terra e o ar.<br>
                — Espera, você é o avatar?<br>
                — Não, mas sou feito de algo que suporta esses elementos.</p>
                
                <p>Tempos depois, <strong>John Dalton</strong> lembrou daquela conversa e disse:<br>
                — Podíamos chamar esse algo indestrutível de <strong>átomo</strong>.</p>
                
                <p>Dalton foi pensar debaixo de uma laranjeira. Uma laranja caiu em sua cabeça.<br>
                — Laranja... O sol, a lua... tudo é redondo! — pensou. Então gritou:<br>
                — Amor! O átomo deve ser em <strong>forma esférica</strong>!</p>
                
                <p>Na palestra, usou bolas de sinuca como demonstração. Mas trocou as cores (descobriu que era daltônico). A plateia riu, mas assim nasceu o <strong>modelo atômico de Dalton</strong>: o átomo como uma esfera maciça, indestrutível e igual para cada elemento. Foi o primeiro passo da química moderna.</p>
            `
        },
        {   
            title: "☢️ Parte 2: Becquerel e a Pedra Filosofal",
            content: `
                <p><strong>Becquerel</strong> trabalhava em minas e encontrou uma pedra linda. Ele a enrolou em papel-filme, mas não havia sol. Guardou-a no bolso da calça. A pedra era <strong>urânio</strong>. Sua perna ficou vermelha, depois veio um câncer e ele precisou amputá-la.</p>
                
                <p>— E agora? Meu bolso foi levado!<br>
                Becquerel, teimoso, guardou a pedra no outro bolso. O mesmo aconteceu. Depois, guardou no bolso da camisa — prejudicou o coração e ele faleceu.</p>
                
                <p>Os alquimistas venderam as pedras como "cosméticos cósmicos". Uns misturaram na água (as pessoas morreram), outros no creme dental (os dentes caíram). Até que um rapaz deu a pedra a <strong>J.J. Thomson</strong>, dizendo:<br>
                — Essa pedra é do demônio, fique com ela!</p>
                
                <p>A ciência jamais esqueceria esse acidente: foi a primeira percepção da <strong>radioatividade</strong> e da energia escondida dentro da matéria.</p>
            `
        },
        {   
            title: "🍮 Parte 3: J.J. Thomson e o Pudim de Passas",
            content: `
                <p>Thomson pegou a pedra de urânio, ligou-a a uma bateria com pólos positivo e negativo. Ele viu <strong>raios de carga indo para o lado negativo</strong>. Descobriu os <strong>elétrons</strong>!</p>
                
                <p>— Dalton dizia que o átomo era indestrutível, mas estou vendo partes menores saindo dele. Chamarei esses corpúsculos de <strong>elétrons</strong>.</p>
                
                <p>A esposa de Thomson fez um pudim de passas (meio desmanchado, virado papa). Quando ele foi comer, as passas caíam do garfo. Teve um insight:<br>
                — Mulher, você é um gênio! O átomo é como um <strong>pudim de passas</strong>: uma massa positiva com elétrons negativos incrustados, como as passas na massa.</p>
                
                <p>Nasceu o <strong>modelo atômico de Thomson</strong>, também chamado de "modelo do pudim de passas". A ciência agora sabia que o átomo tinha partes menores e que os elétrons eram partículas universais.</p>
            `
        },
        {   
            title: "🏅 Parte 4: Rutherford e o Sistema Solar Atômico",
            content: `
                <p><strong>Ernest Rutherford</strong> ainda sonhava com a pedra filosofal. Com seu assistente <strong>Niels Bohr</strong> (que tinha muito medo dele), montou um experimento ousado: uma caixa de chumbo com urânio, uma finíssima película de ouro e um detector de partículas.</p>
                
                <p>Ao atirar partículas alfa na folha de ouro, a maioria atravessava direto, mas <strong>uma em cada 8000 voltava</strong>!<br>
                — É como atirar um canhão em papel e a bala voltar! — exclamou Rutherford, espantado.</p>
                
                <p>Conclusão: o átomo tem um <strong>núcleo pequeno, denso e positivo</strong>, e os elétrons giram ao redor, como planetas em torno do Sol. Nasceu o <strong>modelo atômico de Rutherford (sistema solar)</strong>.</p>
                
                <p>Bohr, ainda assustado, murmurou:<br>
                — Doido... mas eu gosto de pudim.<br>
                — Eu te dou um, menino! — respondeu Rutherford, rindo.</p>
            `
        },
        {   
            title: "🌌 Parte 5: Bohr e os Saltos Quânticos",
            content: `
                <p><strong>Niels Bohr</strong> percebeu um grave problema: se os elétrons giram ao redor do núcleo, eles deveriam perder energia continuamente e colapsar sobre ele. Mas isso não acontece — os átomos são estáveis.</p>
                
                <p>Bohr então propôs uma ideia revolucionária: os elétrons só podem ocupar <strong>certas órbitas permitidas</strong>, com níveis fixos de energia. Quando saltam de uma órbita para outra, emitem ou absorvem luz em cores específicas — foi a explicação para os espectros atômicos.</p>
                
                <p>Nasceu o <strong>modelo atômico de Bohr (1913)</strong>, o primeiro a introduzir a <strong>quantização</strong> na estrutura do átomo. Ele explicou perfeitamente as raias do hidrogênio e ganhou o Nobel em 1922. A frase de Bohr ecoa: <em>"Se a mecânica quântica não te impressionou, você não a entendeu."</em></p>
                
                <p>De repente, o átomo não era mais um sistema solar clássico, mas um mundo de regras misteriosas e saltos quânticos.</p>
            `
        },
        {   
            title: "✨ Parte 6: O Legado dos Modelos Atômicos",
            content: `
                <p>Depois de Bohr, vieram <strong>Schrödinger, Heisenberg e De Broglie</strong>. Descobriram que os elétrons não têm órbitas exatas, mas sim <strong>nuvens de probabilidade</strong> (orbitais). O princípio da incerteza mostrou que não podemos saber ao mesmo tempo a posição e a velocidade de uma partícula.</p>
                
                <p>Hoje sabemos que o átomo é <strong>99,999% espaço vazio</strong>, e que toda a matéria é feita de campos quânticos. Tudo começou com um banho filosófico, uma laranja na cabeça, uma pedra assassina e um pudim de passas.</p>
                
                <p>🧪 <strong>Conclusão:</strong> A ciência avança com curiosidade, erros, acidentes e muito bom humor. De Dalton a Bohr, cada modelo atômico foi um tijolo na construção do conhecimento humano. E quem diria que tudo isso veio de uma simples dúvida: <em>"O que é feito de algo indestrutível?"</em></p>
                
                <p>🌟 <strong>Fim da contação</strong> — mas a ciência nunca termina. Continue curioso, e quem sabe um dia seja você a próximo a ter uma laranja (ou um pudim) na cabeça e mudar o mundo!</p>
            `
        }
    ];

    let currentChapterIndex = 0;      // 0 = primeira parte
    const totalChapters = chapters.length;

    // Elementos DOM
    const chapterBadgeSpan = document.getElementById("chapterBadge");
    const storyTextDiv = document.getElementById("storyText");
    const pageIndicatorSpan = document.getElementById("pageIndicator");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    // Função para atualizar a tela com o capítulo atual
    function updateChapter() {
        const chapter = chapters[currentChapterIndex];
        chapterBadgeSpan.textContent = chapter.title;
        storyTextDiv.innerHTML = chapter.content;
        pageIndicatorSpan.textContent = `Parte ${currentChapterIndex + 1} / ${totalChapters}`;
        
        // Desabilitar botão "Avançar" se for o último capítulo
        if (currentChapterIndex === totalChapters - 1) {
            nextBtn.disabled = true;
            nextBtn.textContent = "📖 Fim da História";
        } else {
            nextBtn.disabled = false;
            nextBtn.textContent = "Avançar ▶";
        }
        
        // Rolagem suave para o topo da história
        document.querySelector(".story-area")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // Avançar para o próximo capítulo
    function nextChapter() {
        if (currentChapterIndex < totalChapters - 1) {
            currentChapterIndex++;
            updateChapter();
        }
    }

    // Recomeçar do início
    function resetStory() {
        currentChapterIndex = 0;
        updateChapter();
    }

    // Eventos dos botões
    nextBtn.addEventListener("click", nextChapter);
    resetBtn.addEventListener("click", resetStory);
    
    // Atalho de teclado: seta direita avança, seta esquerda volta ao início (opcional, mas mantemos só avanço)
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight" && currentChapterIndex < totalChapters - 1) {
            nextChapter();
        } else if (e.key === "Home") {
            resetStory();
        }
    });
    
    // Inicializar a história
    updateChapter();
    
    // Pequeno easter egg: clicar no título mostra curiosidade científica (divertido)
    const headerTitle = document.querySelector(".header h1");
    let clickCount = 0;
    headerTitle.addEventListener("click", () => {
        clickCount++;
        if (clickCount === 3) {
            alert("🔍 Curiosidade: O átomo de hidrogênio tem cerca de 0,05 nanômetro de diâmetro. Seu núcleo é 100 mil vezes menor! A história é maior que o átomo. 😊");
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 1000);
    });
</script>
</body>
</html>
