<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Modelos Atômicos | Contação de História Interativa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a1f 0%, #0f1a0c 100%);
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        /* container principal estilo pergaminho antigo */
        .book-container {
            max-width: 950px;
            width: 100%;
            background: #fff8ed;
            background-image: radial-gradient(circle at 15% 30%, rgba(230, 200, 150, 0.2) 2%, transparent 2.5%);
            background-size: 35px 35px;
            border-radius: 50px 30px 50px 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,245,200,0.9);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* cabeçalho */
        .header {
            background: #2c4727;
            padding: 20px 28px;
            text-align: center;
            border-bottom: 6px solid #f3b33d;
        }

        .header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            color: #ffea9e;
            text-shadow: 3px 3px 0 #4a2a0c;
            font-weight: 800;
            font-family: 'Trebuchet MS', sans-serif;
        }

        .header p {
            color: #f7d977;
            font-style: italic;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        /* área da história */
        .story-area {
            padding: 35px 35px 25px 35px;
            min-height: 520px;
            display: flex;
            flex-direction: column;
        }

        .story-text {
            background: #fffff2;
            padding: 28px 32px;
            border-radius: 45px 25px 45px 25px;
            box-shadow: inset 0 0 0 2px #fff9e8, 0 12px 22px rgba(0,0,0,0.1);
            font-size: 1.22rem;
            line-height: 1.6;
            color: #2c2b1f;
            font-family: 'Georgia', 'Times New Roman', serif;
            margin-bottom: 35px;
            flex: 1;
        }

        /* indicador de capítulo */
        .chapter-badge {
            display: inline-block;
            background: #d4a373;
            color: #2c2b1f;
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 18px;
            font-family: monospace;
            letter-spacing: 1px;
        }

        /* controles de navegação */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #4d6a3b;
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 28px;
            font-size: 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 0 #2a3a1f;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #6a8e4a;
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2a3a1f;
        }

        .nav-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #2a3a1f;
        }

        .nav-btn:disabled {
            background: #8f9e7f;
            box-shadow: 0 4px 0 #5a6a4a;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .reset-btn {
            background: #b46f3a;
            box-shadow: 0 4px 0 #6e3e1a;
        }

        .page-indicator {
            background: #2d2b1f;
            padding: 8px 22px;
            border-radius: 50px;
            color: #ffefb0;
            font-weight: bold;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .footer {
            background: #e9dbbc;
            padding: 14px 28px;
            text-align: center;
            font-size: 0.8rem;
            color: #5a482a;
            border-top: 1px dashed #c7a56b;
            font-style: italic;
        }

        @media (max-width: 650px) {
            .story-text {
                font-size: 1rem;
                padding: 20px;
            }
            .nav-btn {
                padding: 8px 18px;
                font-size: 0.85rem;
            }
            .header h1 {
                font-size: 1.5rem;
            }
            .story-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="book-container">
    <div class="header">
        <h1>⚛️ MODELOS ATÔMICOS ⚗️</h1>
        <p>▸ Uma contação de história — de banhos filosóficos a nuvens quânticas ◂</p>
    </div>
    <div class="story-area">
        <div class="story-text" id="storyText">
            <!-- O texto da história será inserido aqui dinamicamente -->
            <span class="chapter-badge" id="chapterBadge">Parte 1</span>
            <div id="storyContent" style="margin-top: 12px;">
                Carregando...
            </div>
        </div>
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>◀ Voltar</button>
            <div class="page-indicator" id="pageIndicator">Parte 1 / 6</div>
            <button class="nav-btn" id="nextBtn">Avançar ▶</button>
            <button class="nav-btn reset-btn" id="resetBtn">⟳ Recomeçar</button>
        </div>
    </div>
    <div class="footer">
        🧪 Baseado na história original de Dalton, Becquerel, Thomson, Rutherford e Bohr | Cientistas, laranjas, pudins e radioatividade
    </div>
</div>

<script>
    // ============================================================
    // CAPÍTULOS DA HISTÓRIA (versão corrigida, fluida e com humor)
    // ============================================================
    const chapters = [
        {   // Parte 1 - Dalton e a laranja
            title: "🍊 Parte 1: Dalton e a Bola de Sinuca",
            content: `<p>Dois homens tomavam banho juntos. Um deles esfregava as costas do outro e disse:<br>
            — Estou esfregando muito suas costas e sua pele está intacta. Você deve ser feito de algo indestrutível.<br>
            — A pele deve ser feita de algo mais indestrutível do que a água, o fogo, a terra e o ar.<br>
            — Espera, você é o avatar?<br>
            — Não, mas sou feito de algo que suporta esses elementos.</p>
            
            <p>Tempos depois, <strong>John Dalton</strong> lembrou da conversa e disse:<br>
            — Podíamos chamar esse algo indestrutível de <strong>átomo</strong>.</p>
            
            <p>Dalton foi pensar debaixo de uma laranjeira. Uma laranja caiu em sua cabeça.<br>
            — Laranja... O sol, a lua... tudo é redondo! — pensou. Então gritou:<br>
            — Amor! O átomo deve ser em <strong>forma esférica</strong>!</p>
            
            <p>Na palestra, usou bolas de sinuca como demonstração. Mas trocou as cores (descobriu que era daltônico). A plateia riu, mas assim nasceu o <strong>modelo atômico de Dalton</strong>: o átomo como uma esfera maciça, indestrutível e igual para cada elemento. Foi o primeiro passo da química moderna.</p>`
        },
        {   // Parte 2 - Becquerel e a pedra filosofal
            title: "☢️ Parte 2: Becquerel e a Pedra Filosofal",
            content: `<p><strong>Becquerel</strong> trabalhava em minas e encontrou uma pedra linda. Ele a enrolou em papel-filme, mas não havia sol. Guardou-a no bolso da calça. A pedra era <strong>urânio</strong>. Sua perna ficou vermelha, depois veio um câncer e ele precisou amputá-la.</p>
            
            <p>— E agora? Meu bolso foi levado!<br>
            Becquerel, teimoso, guardou a pedra no outro bolso. O mesmo aconteceu. Depois, guardou no bolso da camisa — prejudicou o coração e ele faleceu.</p>
            
            <p>Os alquimistas venderam as pedras como "cosméticos cósmicos". Uns misturaram na água (as pessoas morreram), outros no creme dental (os dentes caíram). Até que um rapaz deu a pedra a <strong>J.J. Thomson</strong>, dizendo:<br>
            — Essa pedra é do demônio, fique com ela!</p>`
        },
        {   // Parte 3 - Thomson e o pudim de passas
            title: "🍮 Parte 3: J.J. Thomson e o Pudim de Passas",
            content: `<p>Thomson pegou a pedra de urânio, ligou-a a uma bateria com pólos positivo e negativo. Ele viu <strong>raios de carga indo para o lado negativo</strong>. Descobriu os <strong>elétrons</strong>!</p>
            
            <p>— Dalton dizia que o átomo era indestrutível, mas estou vendo partes menores saindo dele. Chamarei esses corpúsculos de <strong>elétrons</strong>.</p>
            
            <p>A esposa de Thomson fez um pudim de passas (meio desmanchado, virado papa). Quando ele foi comer, as passas caiam do garfo. Teve um insight:<br>
            — Mulher, você é um gênio! O átomo é como um <strong>pudim de passas</strong>: uma massa positiva com elétrons negativos incrustados.</p>
            
            <p>Nasceu o <strong>modelo atômico de Thomson</strong>, também chamado de "modelo do pudim de passas". A ciência agora sabia que o átomo tinha partes menores.</p>`
        },
        {   // Parte 4 - Rutherford e o experimento da folha de ouro
            title: "🏅 Parte 4: Rutherford e o Sistema Solar Atômico",
            content: `<p><strong>Rutherford</strong> ainda queria a pedra filosofal. Com seu assistente <strong>Bohr</strong> (que tinha muito medo dele), montou um experimento: uma caixa de chumbo com urânio, uma finíssima película de ouro e um detector.</p>
            
            <p>Ao atirar partículas alfa na folha de ouro, a maioria atravessava, mas <strong>uma em cada 8000 voltava</strong>!<br>
            — É como atirar um canhão em papel e a bala voltar! — exclamou Rutherford.</p>
            
            <p>Conclusão: o átomo tem um <strong>núcleo pequeno, denso e positivo</strong>, e os elétrons giram ao redor, como planetas. Nasceu o <strong>modelo atômico de Rutherford (sistema solar)</strong>.</p>
            
            <p>Bohr, ainda assustado, murmurou:<br>
            — Doido... mas eu gosto de pudim.<br>
            — Eu te dou um, menino!</p>`
        },
        {   // Parte 5 - Bohr e as órbitas quânticas
            title: "🌌 Parte 5: Bohr e os Saltos Quânticos",
            content: `<p><strong>Niels Bohr</strong> percebeu um problema: se os elétrons giram ao redor do núcleo, eles deveriam perder energia e colapsar. Mas isso não acontece.</p>
            
            <p>Bohr então propôs uma ideia revolucionária: os elétrons só podem ocupar <strong>certas órbitas permitidas</strong>, com níveis fixos de energia. Quando saltam de uma órbita para outra, emitem ou absorvem luz em cores específicas (espectros).</p>
            
            <p>Nasceu o <strong>modelo atômico de Bohr (1913)</strong>, o primeiro a introduzir a <strong>quantização</strong> na estrutura do átomo. Ele explicou perfeitamente as raias do hidrogênio e ganhou o Nobel em 1922. A frase de Bohr ecoa: <em>"Se a mecânica quântica não te impressionou, você não a entendeu."</em></p>`
        },
        {   // Parte 6 - Legado e curiosidades (final)
            title: "✨ Parte 6: O Legado dos Modelos Atômicos",
            content: `<p>Depois de Bohr, vieram <strong>Schrödinger, Heisenberg e De Broglie</strong>. Descobriram que os elétrons não têm órbitas exatas, mas sim <strong>nuvens de probabilidade</strong> (orbitais). O princípio da incerteza mostrou que não podemos saber tudo ao mesmo tempo.</p>
            
            <p>Hoje sabemos que o átomo é <strong>99,999% espaço vazio</strong>, e que toda a matéria é feita de campos quânticos. Tudo começou com um banho filosófico, uma laranja na cabeça, uma pedra assassina e um pudim de passas.</p>
            
            <p>🧪 <strong>Conclusão:</strong> A ciência avança com curiosidade, erros, acidentes e muito bom humor. De Dalton a Bohr, cada modelo atômico foi um tijolo na construção do conhecimento humano. E quem diria que tudo isso veio de uma dúvida: <em>"O que é feito algo indestrutível?"</em></p>
            
            <p>🌟 Fim da contação — mas a ciência nunca termina. Continue curioso!</p>`
        }
    ];

    let currentChapterIndex = 0;  // 0-index
    const totalChapters = chapters.length;

    // Elementos DOM
    const storyContentDiv = document.getElementById("storyContent");
    const chapterBadgeSpan = document.getElementById("chapterBadge");
    const pageIndicatorSpan = document.getElementById("pageIndicator");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const resetBtn = document.getElementById("resetBtn");

    // Função para atualizar a interface com o capítulo atual
    function updateChapter() {
        const chapter = chapters[currentChapterIndex];
        // Atualizar o título do capítulo (badge)
        chapterBadgeSpan.textContent = chapter.title;
        // Atualizar o conteúdo da história
        storyContentDiv.innerHTML = chapter.content;
        // Atualizar indicador de página (ex: Parte 2 / 6)
        pageIndicatorSpan.textContent = `Parte ${currentChapterIndex + 1} / ${totalChapters}`;
        
        // Gerenciar estado dos botões
        if (currentChapterIndex === 0) {
            prevBtn.disabled = true;
        } else {
            prevBtn.disabled = false;
        }
        
        if (currentChapterIndex === totalChapters - 1) {
            nextBtn.disabled = true;
            // Opcional: mudar texto do próximo para "Final"
            nextBtn.textContent = "Fim ▶";
        } else {
            nextBtn.disabled = false;
            nextBtn.textContent = "Avançar ▶";
        }
        
        // Efeito visual: rolar suavemente para o topo do texto
        document.querySelector(".story-text")?.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    // Avançar para o próximo capítulo
    function nextChapter() {
        if (currentChapterIndex < totalChapters - 1) {
            currentChapterIndex++;
            updateChapter();
        }
    }

    // Voltar para o capítulo anterior
    function prevChapter() {
        if (currentChapterIndex > 0) {
            currentChapterIndex--;
            updateChapter();
        }
    }

    // Resetar para o primeiro capítulo
    function resetStory() {
        currentChapterIndex = 0;
        updateChapter();
    }

    // Eventos dos botões
    prevBtn.addEventListener("click", prevChapter);
    nextBtn.addEventListener("click", nextChapter);
    resetBtn.addEventListener("click", resetStory);
    
    // Atalhos de teclado (seta direita e esquerda)
    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") {
            if (currentChapterIndex < totalChapters - 1) {
                nextChapter();
            }
        } else if (e.key === "ArrowLeft") {
            if (currentChapterIndex > 0) {
                prevChapter();
            }
        } else if (e.key === "Home") {
            resetStory();
        }
    });
    
    // Inicializar a história
    updateChapter();
    
    // Adicionar um pequeno Easter Egg: clicar 3x no título mostra curiosidade
    const headerTitle = document.querySelector(".header h1");
    let clickCount = 0;
    headerTitle.addEventListener("click", () => {
        clickCount++;
        if (clickCount === 3) {
            alert("🔍 Curiosidade: O átomo de hidrogênio tem cerca de 0,05 nanômetro de diâmetro. Seu núcleo é 100 mil vezes menor! A história é maior que o átomo. 😊");
            clickCount = 0;
        }
        setTimeout(() => { clickCount = 0; }, 1000);
    });
</script>
</body>
</html>
